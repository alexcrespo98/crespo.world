<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>recipeasy</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000;
      color: #0f0;
      font-family: monospace;
      padding: 3em 2em;
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }
    a { color: #0f0; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .back { display: block; margin-bottom: 2.5em; font-size: 0.85rem; opacity: 0.7; }
    h1 { font-size: 1rem; font-weight: normal; margin: 0 0 0.3em 0; opacity: 0.65; letter-spacing: 0.06em; }
    .subtitle { font-size: 0.75rem; opacity: 0.4; margin-bottom: 2em; }
    textarea, input[type="text"] {
      width: 100%;
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      font-family: monospace;
      font-size: 0.85rem;
      padding: 0.7em;
      resize: vertical;
      outline: none;
    }
    textarea { min-height: 80px; }
    button {
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      font-family: monospace;
      font-size: 0.85rem;
      padding: 0.5em 1.2em;
      cursor: pointer;
      margin-top: 0.6em;
    }
    button:hover { background: #0f0; color: #000; }
    button:disabled { opacity: 0.35; cursor: default; }
    .status { font-size: 0.8rem; opacity: 0.6; margin: 0.6em 0; min-height: 1.2em; }
    .status.err { color: #f55; opacity: 1; }
    hr { border: none; border-top: 1px solid #0f0; opacity: 0.2; margin: 2em 0; }

    /* recipe output */
    #recipe { display: none; margin-top: 2em; }
    .recipe-title { font-size: 1rem; margin-bottom: 1.5em; letter-spacing: 0.04em; }
    .section-label { font-size: 0.7rem; opacity: 0.45; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.8em; }
    .ingredients { margin-bottom: 2em; }
    .ing-row {
      display: flex;
      gap: 1em;
      padding: 0.25em 0;
      font-size: 0.88rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(0,255,0,0.07);
    }
    .ing-row:hover { opacity: 0.7; }
    .ing-row.done { opacity: 0.3; text-decoration: line-through; }
    .ing-amount { min-width: 90px; opacity: 0.75; flex-shrink: 0; }
    .ing-name { flex: 1; }
    .steps { counter-reset: step; }
    .step-row {
      display: flex;
      gap: 0.8em;
      margin-bottom: 0.9em;
      font-size: 0.88rem;
      align-items: flex-start;
    }
    .step-num {
      min-width: 1.4em;
      opacity: 0.4;
      flex-shrink: 0;
      padding-top: 0.05em;
    }
    .step-text { flex: 1; line-height: 1.6; }
    .step-row.done .step-text { opacity: 0.35; text-decoration: line-through; }
    .step-row input[type="checkbox"] { display: none; }

    /* multiplier */
    .multiplier { margin: 1.5em 0 0 0; font-size: 0.8rem; opacity: 0.6; }
    .multiplier select {
      background: #000;
      color: #0f0;
      border: 1px solid rgba(0,255,0,0.4);
      font-family: monospace;
      font-size: 0.8rem;
      padding: 0.2em 0.4em;
      margin-left: 0.4em;
    }

    /* source link */
    .source { font-size: 0.72rem; opacity: 0.35; margin-top: 1.5em; }

    /* chat bubble */
    #chat-bubble {
      position: fixed;
      bottom: 1.5em;
      right: 1.5em;
      width: 36px;
      height: 36px;
      border: 1px solid #0f0;
      background: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    #chat-bubble:hover { opacity: 1; }
    #chat-bubble.active { opacity: 1; }
    #chat-panel {
      display: none;
      position: fixed;
      bottom: 4.5em;
      right: 1.5em;
      width: 300px;
      border: 1px solid rgba(0,255,0,0.4);
      background: #000;
      font-size: 0.8rem;
    }
    #chat-panel.open { display: flex; flex-direction: column; }
    #chat-log {
      padding: 0.8em;
      max-height: 220px;
      overflow-y: auto;
      flex: 1;
    }
    .chat-msg { margin-bottom: 0.6em; line-height: 1.5; }
    .chat-msg.user { opacity: 0.6; }
    .chat-msg.user::before { content: "> "; }
    .chat-msg.bot { opacity: 0.9; }
    #chat-input-row {
      display: flex;
      border-top: 1px solid rgba(0,255,0,0.2);
    }
    #chat-input {
      flex: 1;
      background: #000;
      color: #0f0;
      border: none;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 0.5em 0.6em;
      outline: none;
    }
    #chat-send {
      background: #000;
      color: #0f0;
      border: none;
      border-left: 1px solid rgba(0,255,0,0.2);
      font-family: monospace;
      font-size: 0.8rem;
      padding: 0.5em 0.7em;
      cursor: pointer;
      margin: 0;
    }
    #chat-send:hover { background: #0f0; color: #000; }
    #chat-no-recipe {
      padding: 0.8em;
      opacity: 0.4;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <a href="/random/" class="back">&larr; random</a>
  <h1>recipeasy</h1>
  <p class="subtitle">paste a url, recipe text, or html &mdash; or just search</p>

  <textarea id="input" placeholder="chocolate chip cookies&#10;https://allrecipes.com/recipe/...&#10;or paste recipe text / html"></textarea>
  <button id="go-btn" onclick="simplify()">simplify</button>
  <div class="status" id="status"></div>

  <div id="recipe">
    <hr>
    <div class="recipe-title" id="recipe-title"></div>

    <div class="ingredients">
      <div class="section-label">ingredients</div>
      <div id="ing-list"></div>
      <div class="multiplier">
        servings:
        <select id="multiplier" onchange="applyMultiplier()">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
          <option value="3">3x</option>
          <option value="4">4x</option>
        </select>
      </div>
    </div>

    <div class="section-label">instructions</div>
    <div class="steps" id="step-list"></div>

    <div class="source" id="source-link"></div>
  </div>

  <!-- chat bubble -->
  <div id="chat-bubble" onclick="toggleChat()" title="ask about this recipe">&#x1F4AC;</div>
  <div id="chat-panel">
    <div id="chat-no-recipe">simplify a recipe first to chat about it.</div>
    <div id="chat-log" style="display:none"></div>
    <div id="chat-input-row" style="display:none">
      <input id="chat-input" type="text" placeholder="ask anything about this recipe..." onkeydown="if(event.key==='Enter')sendChat()">
      <button id="chat-send" onclick="sendChat()">send</button>
    </div>
  </div>

  <script>
    const API = 'https://petri.tailcedf4b.ts.net';
    let currentRecipe = null;
    let chatHistory = [];
    let baseIngredients = [];

    function setStatus(msg, isErr) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isErr ? ' err' : '');
    }

    async function simplify() {
      const input = document.getElementById('input').value.trim();
      if (!input) return;
      const btn = document.getElementById('go-btn');
      btn.disabled = true;
      setStatus('working...');
      document.getElementById('recipe').style.display = 'none';

      try {
        const res = await fetch(API + '/simplify', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({input})
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'error');
        renderRecipe(data.simplified_recipe, data.source_url);
        setStatus('');
        chatHistory = [];
        enableChat();
      } catch(e) {
        setStatus(e.message, true);
      } finally {
        btn.disabled = false;
      }
    }

    function parseRecipe(text) {
      const lines = text.split('\n');
      let title = '', ingredients = [], instructions = [], section = null;
      for (let line of lines) {
        const t = line.trim();
        if (!t) continue;
        if (t.startsWith('TITLE:')) { title = t.replace('TITLE:', '').trim(); continue; }
        if (t.startsWith('INGREDIENTS')) { section = 'ing'; continue; }
        if (t.startsWith('INSTRUCTIONS')) { section = 'inst'; continue; }
        if (section === 'ing' && t.startsWith('-')) {
          ingredients.push(t.replace(/^-\s*/, ''));
        } else if (section === 'inst') {
          const m = t.match(/^(\d+)\.\s+(.+)/);
          if (m) instructions.push({n: parseInt(m[1]), text: m[2]});
        }
      }
      return {title, ingredients, instructions};
    }

    function parseAmount(ing) {
      // split "1 cup flour" into {amount: "1", unit: "cup", name: "flour"}
      const m = ing.match(/^([\d\s\/\.]+)\s*(cup|cups|tbsp|tablespoon|tablespoons|tsp|teaspoon|teaspoons|oz|ounce|ounces|lb|lbs|pound|pounds|g|gram|grams|ml|l|clove|cloves|pinch|dash|can|cans|slice|slices|piece|pieces)?\s*(.+)$/i);
      if (m) return {amount: m[1].trim(), unit: m[2] || '', name: m[3].trim(), original: ing};
      return {amount: '', unit: '', name: ing, original: ing};
    }

    function multiplyAmount(amountStr, mult) {
      const frac = amountStr.match(/^(\d+)\/(\d+)$/);
      if (frac) return fmt(parseInt(frac[1]) / parseInt(frac[2]) * mult);
      const mixed = amountStr.match(/^(\d+)\s+(\d+)\/(\d+)$/);
      if (mixed) return fmt((parseInt(mixed[1]) + parseInt(mixed[2]) / parseInt(mixed[3])) * mult);
      const n = parseFloat(amountStr);
      return isNaN(n) ? amountStr : fmt(n * mult);
    }

    function fmt(n) {
      const fracs = [[0.125,'1/8'],[0.25,'1/4'],[0.333,'1/3'],[0.5,'1/2'],[0.667,'2/3'],[0.75,'3/4']];
      const w = Math.floor(n), f = n - w;
      if (f < 0.01) return w.toString();
      for (const [v, s] of fracs) if (Math.abs(f - v) < 0.04) return w > 0 ? `${w} ${s}` : s;
      return n % 1 === 0 ? n.toString() : n.toFixed(1).replace(/\.0$/, '');
    }

    function renderRecipe(text, sourceUrl) {
      currentRecipe = text;
      const parsed = parseRecipe(text);
      baseIngredients = parsed.ingredients.map(parseAmount);

      document.getElementById('recipe-title').textContent = parsed.title || 'recipe';
      document.getElementById('multiplier').value = '1';
      renderIngredients(1);
      renderSteps(parsed.instructions);

      const src = document.getElementById('source-link');
      src.innerHTML = sourceUrl ? `source: <a href="${sourceUrl}" target="_blank">${sourceUrl}</a>` : '';

      document.getElementById('recipe').style.display = 'block';
    }

    function renderIngredients(mult) {
      const list = document.getElementById('ing-list');
      list.innerHTML = '';
      baseIngredients.forEach((ing, i) => {
        const row = document.createElement('div');
        row.className = 'ing-row';
        row.dataset.idx = i;
        row.onclick = () => row.classList.toggle('done');
        const amt = ing.amount ? multiplyAmount(ing.amount, mult) : '';
        const unit = ing.unit ? ' ' + ing.unit : '';
        row.innerHTML = `<span class="ing-amount">${amt}${unit}</span><span class="ing-name">${ing.name}</span>`;
        list.appendChild(row);
      });
    }

    function renderSteps(instructions) {
      const list = document.getElementById('step-list');
      list.innerHTML = '';
      instructions.forEach((inst, i) => {
        const row = document.createElement('div');
        row.className = 'step-row';
        row.innerHTML = `<span class="step-num">${inst.n}.</span><span class="step-text">${inst.text}</span>`;
        row.onclick = () => row.classList.toggle('done');
        list.appendChild(row);
      });
    }

    function applyMultiplier() {
      const mult = parseFloat(document.getElementById('multiplier').value);
      renderIngredients(mult);
    }

    // --- CHAT ---

    function toggleChat() {
      const panel = document.getElementById('chat-panel');
      const bubble = document.getElementById('chat-bubble');
      const isOpen = panel.classList.contains('open');
      panel.classList.toggle('open', !isOpen);
      bubble.classList.toggle('active', !isOpen);
    }

    function enableChat() {
      document.getElementById('chat-no-recipe').style.display = 'none';
      document.getElementById('chat-log').style.display = 'block';
      document.getElementById('chat-input-row').style.display = 'flex';
    }

    function appendChatMsg(text, role) {
      const log = document.getElementById('chat-log');
      const div = document.createElement('div');
      div.className = 'chat-msg ' + role;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    async function sendChat() {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (!msg || !currentRecipe) return;
      input.value = '';
      appendChatMsg(msg, 'user');

      try {
        const res = await fetch(API + '/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({recipe: currentRecipe, message: msg, history: chatHistory})
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'error');
        appendChatMsg(data.reply, 'bot');
        chatHistory.push({user: msg, assistant: data.reply});
        if (chatHistory.length > 10) chatHistory = chatHistory.slice(-10);
      } catch(e) {
        appendChatMsg('error: ' + e.message, 'bot');
      }
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); simplify(); }
    });
  </script>
</body>
</html>
