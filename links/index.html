<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>links</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #0f0;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2em;
    }
    h1 {
      font-size: 1.1rem;
      margin: 0 0 1.8em 0;
      font-weight: normal;
      letter-spacing: 0.08em;
      opacity: 0.75;
    }
    ul { list-style: none; margin: 0; padding: 0; text-align: center; }
    li { margin: 0.55em 0; }
    a { color: #0f0; text-decoration: none; font-size: 0.9rem; }
    a:hover { text-decoration: underline; }
    .back {
      display: inline-block;
      margin-bottom: 2rem;
      opacity: 0.7;
      font-size: 0.9rem;
    }
    .hint {
      margin-top: 2rem;
      opacity: 0.5;
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <a href="/" class="back">&larr; back</a>
  <h1>petri services</h1>
  <ul>
    <li><a href="https://petri.tailcedf4b.ts.net/scarecrow" target="_blank" rel="noopener">scarecrow</a></li>
    <li><a href="https://petri.tailcedf4b.ts.net/hexo" target="_blank" rel="noopener">hexo</a></li>
    <li><a href="https://petri.tailcedf4b.ts.net/agentmemory" target="_blank" rel="noopener">agentmemory</a></li>
    <li><a href="http://100.82.98.73:8090" target="_blank" rel="noopener">security</a></li>
    <li><a href="http://100.82.98.73:7860/" target="_blank" rel="noopener">chat</a></li>
  </ul>
  <p class="hint">requires Tailscale. all services run on petri.</p>
</body>
</html>
