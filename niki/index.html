<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #22c55e;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2em;
    }
    main { width: min(100%, 34rem); text-align: center; }
    a { color: #22c55e; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { margin: 0 0 1rem 0; font-size: 1.1rem; font-weight: normal; letter-spacing: 0.08em; }
    p { margin: 0 0 1rem 0; line-height: 1.7; font-size: 0.95rem; }
    .open {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.85rem 1.1rem;
      border: 1px solid #22c55e;
    }
    .hint { margin-top: 1.25rem; opacity: 0.75; font-size: 0.9rem; }
  </style>
</head>
<body>
  <main>
    <h1>dashboard</h1>
    <p id="status">opening dashboard...</p>
    <p>make sure you are connected to the home network or Tailscale.</p>
    <p><a id="open-link" class="open" href="http://100.102.143.13:8080/?user=niki">open dashboard</a></p>
    <p class="hint">the dashboard runs on a local mac mini. if it does not open, check that you are on the same network or connected via Tailscale.</p>
  </main>
  <script>
    (function () {
      const target = 'http://100.102.143.13:8080/?user=niki';
      const link = document.getElementById('open-link');
      if (link) link.href = target;
      document.getElementById('status').textContent = 'opening dashboard...';
      window.setTimeout(function () {
        window.location.href = target;
      }, 150);
    })();
  </script>
</body>
</html>
