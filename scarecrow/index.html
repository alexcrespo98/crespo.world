<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>scarecrow</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #0f0;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2em;
    }
    main {
      width: min(100%, 34rem);
      text-align: center;
    }
    a {
      color: #0f0;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .back {
      display: inline-block;
      margin-bottom: 2rem;
      opacity: 0.7;
      font-size: 0.9rem;
    }
    h1 {
      margin: 0 0 1rem 0;
      font-size: 1.1rem;
      font-weight: normal;
      letter-spacing: 0.08em;
    }
    p {
      margin: 0 0 1rem 0;
      line-height: 1.7;
      font-size: 0.95rem;
    }
    .open {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.85rem 1.1rem;
      border: 1px solid #0f0;
    }
    .hint {
      margin-top: 1.25rem;
      opacity: 0.75;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <a href="/" class="back">&larr; back</a>
    <h1>scarecrow</h1>
    <p id="status">opening greenhouse dashboard...</p>
    <p>if it does not open, make sure Tailscale is connected.</p>
    <p><a id="open-link" class="open" href="https://petri.tailcedf4b.ts.net/scarecrow">open scarecrow</a></p>
    <p class="hint">requires Tailscale. scarecrow runs on petri (port 8091).</p>
  </main>
  <script>
    (function () {
      const target = 'https://petri.tailcedf4b.ts.net/scarecrow';
      const link = document.getElementById('open-link');
      const status = document.getElementById('status');
      if (link) {
        link.href = target;
        link.target = '_blank';
      }
      status.textContent = 'click the button below to open scarecrow in a new tab';
    })();
  </script>
</body>
</html>
