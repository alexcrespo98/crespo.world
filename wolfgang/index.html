<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>wolfgang</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #0f0;
      font-family: monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem;
      border-bottom: 1px solid #0f0;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header a {
      color: #0f0;
      text-decoration: none;
      opacity: 0.7;
      font-size: 0.9rem;
    }
    header a:hover { opacity: 1; }
    header h1 {
      font-size: 1.1rem;
      font-weight: normal;
      letter-spacing: 0.08em;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg {
      max-width: 80%;
      padding: 0.75rem 1rem;
      border: 1px solid #0f0;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: rgba(0, 255, 0, 0.1);
    }
    .msg.assistant {
      align-self: flex-start;
    }
    .msg.system {
      align-self: center;
      opacity: 0.6;
      font-size: 0.85rem;
      border-style: dashed;
    }
    #input-area {
      padding: 1rem;
      border-top: 1px solid #0f0;
      display: flex;
      gap: 0.5rem;
    }
    #text-input {
      flex: 1;
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 0.75rem;
      font-family: monospace;
      font-size: 0.95rem;
      resize: none;
      min-height: 2.5rem;
      max-height: 8rem;
    }
    #text-input:focus {
      outline: none;
      border-color: #0f0;
      box-shadow: 0 0 8px rgba(0, 255, 0, 0.3);
    }
    button {
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 0.75rem 1rem;
      font-family: monospace;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #0f0;
      color: #000;
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #voice-btn.recording {
      background: #f00;
      color: #000;
      border-color: #f00;
    }
    #voice-btn.recording .wave-bar {
      background: #000;
    }
    .wave-bars {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 16px;
    }
    .wave-bar {
      width: 3px;
      background: #0f0;
      border-radius: 1px;
      transition: height 0.1s;
    }
    .wave-bar:nth-child(1) { height: 6px; }
    .wave-bar:nth-child(2) { height: 12px; }
    .wave-bar:nth-child(3) { height: 8px; }
    #voice-btn.recording .wave-bar {
      animation: wave-anim 0.6s ease-in-out infinite alternate;
    }
    #voice-btn.recording .wave-bar:nth-child(2) {
      animation-delay: 0.15s;
    }
    #voice-btn.recording .wave-bar:nth-child(3) {
      animation-delay: 0.3s;
    }
    @keyframes wave-anim {
      0% { height: 4px; }
      100% { height: 16px; }
    }
    .typing {
      opacity: 0.6;
      font-style: italic;
    }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    #login-btn, #logout-btn {
      font-size: 0.8rem;
      padding: 0.4rem 0.7rem;
    }
    #logout-btn { display: none; }
    #user-label {
      font-size: 0.8rem;
      opacity: 0.7;
    }
    #model-select {
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 0.4rem 0.5rem;
      font-family: monospace;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #model-select:focus {
      outline: none;
      box-shadow: 0 0 8px rgba(0, 255, 0, 0.3);
    }
    #model-select option {
      background: #000;
      color: #0f0;
    }
    .login-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .login-overlay.hidden { display: none; }
    .login-box {
      border: 1px solid #0f0;
      padding: 2rem;
      background: #000;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 260px;
    }
    .login-box h2 {
      font-size: 1rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      color: #0f0;
    }
    .login-box input {
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 0.6rem;
      font-family: monospace;
      font-size: 0.9rem;
    }
    .login-box input:focus {
      outline: none;
      box-shadow: 0 0 8px rgba(0, 255, 0, 0.3);
    }
    .login-error {
      color: #f00;
      font-size: 0.8rem;
      display: none;
    }
    @media (max-width: 600px) {
      .msg { max-width: 90%; }
      header h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/">&larr; back</a>
    <h1>wolfgang</h1>
    <div class="header-right">
      <select id="model-select" title="model"></select>
      <span id="user-label"></span>
      <button id="login-btn">login</button>
      <button id="logout-btn">logout</button>
    </div>
  </header>

  <div id="login-overlay" class="login-overlay hidden">
    <div class="login-box">
      <h2>login</h2>
      <input id="login-user" type="text" placeholder="username" autocomplete="username">
      <input id="login-pass" type="password" placeholder="password" autocomplete="current-password">
      <span id="login-error" class="login-error">invalid credentials</span>
      <button id="login-submit">enter</button>
      <button id="login-cancel">cancel</button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="text-input" placeholder="type a message..." rows="1"></textarea>
    <button id="send-btn">send</button>
    <button id="voice-btn"><span class="wave-bars"><span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span></span></button>
  </div>

  <script>
    const API_BASE = 'https://petri.tailcedf4b.ts.net/wolfgang';
    const messagesEl = document.getElementById('messages');
    const textInput = document.getElementById('text-input');
    const sendBtn = document.getElementById('send-btn');
    const voiceBtn = document.getElementById('voice-btn');
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const userLabel = document.getElementById('user-label');
    const modelSelect = document.getElementById('model-select');
    const loginOverlay = document.getElementById('login-overlay');
    const loginUser = document.getElementById('login-user');
    const loginPass = document.getElementById('login-pass');
    const loginSubmit = document.getElementById('login-submit');
    const loginCancel = document.getElementById('login-cancel');
    const loginError = document.getElementById('login-error');

    let conversationHistory = [];
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let authToken = localStorage.getItem('wolfgang_token');
    let currentUser = null;

    // Auth functions
    async function checkAuth() {
      if (!authToken) {
        setLoggedOut();
        return;
      }
      try {
        const res = await fetch(`${API_BASE}/me`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (res.ok) {
          const data = await res.json();
          currentUser = data.username;
          setLoggedIn();
        } else {
          localStorage.removeItem('wolfgang_token');
          authToken = null;
          setLoggedOut();
        }
      } catch (err) {
        setLoggedOut();
      }
    }

    function setLoggedIn() {
      loginBtn.style.display = 'none';
      logoutBtn.style.display = 'inline-block';
      userLabel.textContent = currentUser;
    }

    function setLoggedOut() {
      loginBtn.style.display = 'inline-block';
      logoutBtn.style.display = 'none';
      userLabel.textContent = '';
      currentUser = null;
    }

    async function doLogin(username, password) {
      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        if (!res.ok) throw new Error('Invalid credentials');
        const data = await res.json();
        authToken = data.token;
        currentUser = data.username;
        localStorage.setItem('wolfgang_token', authToken);
        setLoggedIn();
        loginOverlay.classList.add('hidden');
        loginError.style.display = 'none';
        addMessage('system', `welcome back, ${currentUser}.`);
      } catch (err) {
        loginError.style.display = 'block';
      }
    }

    function doLogout() {
      authToken = null;
      currentUser = null;
      localStorage.removeItem('wolfgang_token');
      setLoggedOut();
      conversationHistory = [];
      messagesEl.innerHTML = '';
      addMessage('system', 'wolfgang ready. ask anything.');
    }

    // Model selector
    async function loadModels() {
      try {
        const res = await fetch(`${API_BASE}/models`);
        if (res.ok) {
          const data = await res.json();
          modelSelect.innerHTML = '';
          data.models.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m;
            opt.textContent = m;
            if (m === data.default) opt.selected = true;
            modelSelect.appendChild(opt);
          });
        }
      } catch (err) {
        // Fallback to default
        modelSelect.innerHTML = '<option value="qwen2.5:7b">qwen2.5:7b</option>';
      }
    }

    // Message handling
    function addMessage(role, content, isTyping = false) {
      const div = document.createElement('div');
      div.className = `msg ${role}${isTyping ? ' typing' : ''}`;
      div.textContent = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendMessage(text) {
      if (!text.trim()) return;

      addMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });

      const typingEl = addMessage('assistant', 'thinking...', true);
      sendBtn.disabled = true;

      try {
        const headers = { 'Content-Type': 'application/json' };
        if (authToken) headers['Authorization'] = `Bearer ${authToken}`;

        const res = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            message: text,
            history: conversationHistory.slice(-20),
            model: modelSelect.value
          })
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        typingEl.remove();
        addMessage('assistant', data.response);
        conversationHistory.push({ role: 'assistant', content: data.response });

      } catch (err) {
        typingEl.remove();
        addMessage('system', `error: ${err.message}. make sure tailscale is connected.`);
      } finally {
        sendBtn.disabled = false;
        textInput.focus();
      }
    }

    // Event listeners
    sendBtn.addEventListener('click', () => {
      const text = textInput.value.trim();
      if (text) {
        sendMessage(text);
        textInput.value = '';
        textInput.style.height = 'auto';
      }
    });

    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });

    textInput.addEventListener('input', () => {
      textInput.style.height = 'auto';
      textInput.style.height = Math.min(textInput.scrollHeight, 128) + 'px';
    });

    loginBtn.addEventListener('click', () => {
      loginOverlay.classList.remove('hidden');
      loginUser.value = '';
      loginPass.value = '';
      loginError.style.display = 'none';
      loginUser.focus();
    });

    loginSubmit.addEventListener('click', () => {
      doLogin(loginUser.value.trim(), loginPass.value);
    });

    loginCancel.addEventListener('click', () => {
      loginOverlay.classList.add('hidden');
    });

    loginPass.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        loginSubmit.click();
      }
    });

    logoutBtn.addEventListener('click', doLogout);

    voiceBtn.addEventListener('click', async () => {
      if (isRecording) {
        mediaRecorder.stop();
        voiceBtn.classList.remove('recording');
        isRecording = false;
      } else {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = (e) => {
            audioChunks.push(e.data);
          };

          mediaRecorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            await transcribeAndSend(blob);
          };

          mediaRecorder.start();
          voiceBtn.classList.add('recording');
          isRecording = true;
        } catch (err) {
          addMessage('system', `microphone error: ${err.message}`);
        }
      }
    });

    async function transcribeAndSend(blob) {
      const typingEl = addMessage('system', 'transcribing...', true);

      try {
        const formData = new FormData();
        formData.append('audio', blob, 'recording.webm');

        const res = await fetch(`${API_BASE}/transcribe`, {
          method: 'POST',
          body: formData
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        typingEl.remove();

        if (data.text) {
          sendMessage(data.text);
        } else {
          addMessage('system', 'no speech detected.');
        }

      } catch (err) {
        typingEl.remove();
        addMessage('system', `transcription error: ${err.message}`);
      }
    }

    // Initialize
    loadModels();
    checkAuth();
    addMessage('system', 'wolfgang ready. ask anything.');
    textInput.focus();
  </script>
</body>
</html>
